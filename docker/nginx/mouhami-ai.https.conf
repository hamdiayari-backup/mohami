# TLS front-end for mouhami-ai.tn
# ---------------------------------------------------------------------------
# Replaces the image default HTTP-only config when certificates exist:
#
#   docker run -d --name mouhami-web \
#     -p 80:80 -p 443:443 \
#     -v /etc/letsencrypt:/etc/letsencrypt:ro \
#     -v /path/to/mouhami-ai.https.conf:/etc/nginx/conf.d/default.conf:ro \
#     mouhami-ai:web
#
# Adjust ssl_certificate / ssl_certificate_key if your Certbot paths differ.
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name mouhami-ai.tn www.mouhami-ai.tn;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mouhami-ai.tn www.mouhami-ai.tn;

    ssl_certificate     /etc/letsencrypt/live/mouhami-ai.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mouhami-ai.tn/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}
