# mouhami-ai.tn — HTTP (TLS is usually terminated here with a second server block
# or a reverse proxy; see docker/nginx/mouhami-ai.https.conf for Let's Encrypt paths)

server {
    listen 80;
    listen [::]:80;
    server_name mouhami-ai.tn www.mouhami-ai.tn;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Let's Encrypt HTTP-01 (optional webroot; mount host dir if you use Certbot)
    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed assets + static media
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML: short cache (SPA shell updates)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    access_log /var/log/nginx/mouhami-ai.access.log main;
    error_log  /var/log/nginx/mouhami-ai.error.log warn;
}
